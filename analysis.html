<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC Analysis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f3f4f6;color:#1a1a1a;min-height:100vh}
.header{background:#1b5e20;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600}
.header span{font-size:12px;opacity:.7;margin-left:auto}
.container{max-width:1000px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:18px;background:#fff;border-radius:10px;padding:5px;border:1px solid #e0e0e0}
.tab{padding:8px 18px;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500;color:#555;transition:all .2s;flex:1;text-align:center}
.tab.active{background:#1b5e20;color:#fff}
.card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:20px;margin-bottom:14px}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#1b5e20}
.team-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;transition:all .2s;background:#fff;margin-bottom:8px}
.team-row:hover{background:#f1f8e9;border-color:#a5d6a7}
.team-avatar{width:44px;height:44px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#1b5e20;overflow:hidden;flex-shrink:0}
.team-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.team-num{font-size:16px;font-weight:700;color:#1b5e20}
.team-name{font-size:13px;color:#555}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-win{background:#c8e6c9;color:#1b5e20}
.badge-loss{background:#ffcdd2;color:#b71c1c}
.badge-gray{background:#f5f5f5;color:#555;border:1px solid #ddd}
.back-btn{background:none;border:none;color:#2e7d32;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:14px;font-weight:500}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat-box{background:#f9fbe7;border:1px solid #dce775;border-radius:10px;padding:12px;text-align:center}
.stat-label{font-size:11px;color:#777;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:#1b5e20}
.detail-hero{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.progress-bar{height:8px;border-radius:4px;background:#e0e0e0;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:4px;background:#43a047;transition:width .4s}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px}
.rank-num{font-size:13px;font-weight:700;color:#fff;background:#1b5e20;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.compare-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:0;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden}
.compare-col{padding:0}
.compare-header{background:#1b5e20;color:#fff;padding:12px;text-align:center;font-weight:600}
.compare-label-col{background:#f5f5f5;display:flex;flex-direction:column}
.compare-label{padding:10px 12px;font-size:12px;color:#555;font-weight:500;text-align:center;border-bottom:1px solid #e0e0e0}
.compare-val{padding:10px 12px;font-size:14px;font-weight:600;text-align:center;border-bottom:1px solid #e0e0e0}
.compare-val.better{color:#2e7d32;background:#f1f8e9}
.compare-val.worse{color:#b71c1c;background:#fff8f8}
.loading{padding:30px;text-align:center;color:#888;font-size:14px}
select,input{border:1px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;background:#fafafa}
button{border:none;border-radius:8px;padding:9px 18px;font-size:14px;cursor:pointer;font-weight:500}
.btn-primary{background:#1b5e20;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
.btn-sm.active-sel{background:#1b5e20;color:#fff;border-color:#1b5e20}
.event-pill{background:#e8f5e9;color:#2e7d32;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.match-score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.score-hl{font-weight:700}
.score-hi{color:#2e7d32}
.score-lo{color:#c62828}
</style>
</head>
<body>
<div class="header">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  <h1>FRC Analysis</h1>
  <span id="hdr-status"></span>
</div>
<div class="container" id="app"><div class="loading">Loading scouting data...</div></div>

<script>
const TBA='iKwYPFM2U6Qnn2VRXyMclANWgdYrWDHI63wr69b9mGHPvB9k1gvZbNi9f3qljuD7';
let state={tab:'teams',scoutData:{},teams:[],eventCode:'',screen:'list',selTeam:null,compareA:null,compareB:null,tbaCache:{}};

async function fetchTBA(path){
  if(state.tbaCache[path])return state.tbaCache[path];
  const r=await fetch('https://www.thebluealliance.com/api/v3'+path,{headers:{'X-TBA-Auth-Key':TBA}});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  state.tbaCache[path]=d;
  return d;
}

async function loadStorage(){
  try{
    const r=await window.storage.get('frc_scout_data',true);
    if(r&&r.value){
      const d=JSON.parse(r.value);
      state.scoutData=d.scoutedData||{};
      state.teams=d.teams||[];
      state.eventCode=d.eventCode||'';
    }
  }catch(e){}
  render();
}

function scoutedTeams(){
  return state.teams.filter(t=>state.scoutData[t.number]&&state.scoutData[t.number].length>0);
}

function calcStats(num){
  const matches=state.scoutData[num]||[];
  if(!matches.length)return null;
  const wins=matches.filter(m=>m.result==='win').length;
  const losses=matches.filter(m=>m.result==='loss').length;
  const ties=matches.filter(m=>m.result==='tie').length;
  const scores=matches.map(m=>calcMatchScore(m));
  const avgScore=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const maxScore=Math.max(...scores);
  const minScore=Math.min(...scores);
  const avgCoral=matches.map(m=>(m.autoCoralL1||0)+(m.autoCoralL2||0)+(m.autoCoralL3||0)+(m.autoCoralL4||0)+(m.teleCoralL1||0)+(m.teleCoralL2||0)+(m.teleCoralL3||0)+(m.teleCoralL4||0));
  const avgCoralVal=avgCoral.length?Math.round(avgCoral.reduce((a,b)=>a+b,0)/avgCoral.length*10)/10:0;
  const climbCount=matches.filter(m=>m.endgame&&m.endgame!=='None'&&m.endgame!=='').length;
  const climbPct=Math.round(climbCount/matches.length*100);
  return{wins,losses,ties,avgScore,maxScore,minScore,avgCoralVal,climbPct,matchCount:matches.length};
}

function calcMatchScore(m){
  const auto=(m.autoCoralL1||0)*3+(m.autoCoralL2||0)*4+(m.autoCoralL3||0)*6+(m.autoCoralL4||0)*7+(m.autoAlgae||0)*4+(m.autoAlgaeProc||0)*6+(m.mobility==='yes'?3:0);
  const tele=(m.teleCoralL1||0)*2+(m.teleCoralL2||0)*3+(m.teleCoralL3||0)*4+(m.teleCoralL4||0)*5+(m.teleAlgae||0)*4+(m.teleAlgaeProc||0)*6;
  const end=m.endgame==='Shallow Hang'?6:m.endgame==='Deep Hang'?12:m.endgame==='Park'?2:0;
  return auto+tele+end;
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='list')app.innerHTML=renderList();
  else if(state.screen==='detail')app.innerHTML=renderDetail();
  else if(state.screen==='loading-detail')app.innerHTML=`<div class="loading">Loading team data from TBA...</div>`;
}

function renderList(){
  const teams=scoutedTeams();
  if(!teams.length)return`<div class="card"><div style="color:#888;font-size:14px">No scouted teams found. Make sure the Scout app has saved data and both apps are open in the same browser.</div><div style="font-size:12px;color:#aaa;margin-top:8px">Event: ${state.eventCode||'none loaded'}</div></div>`;
  return`
  <div class="tabs">
    <div class="tab ${state.tab==='teams'?'active':''}" onclick="state.tab='teams';render()">Teams</div>
    <div class="tab ${state.tab==='rankings'?'active':''}" onclick="state.tab='rankings';render()">Rankings</div>
    <div class="tab ${state.tab==='compare'?'active':''}" onclick="state.tab='compare';render()">Compare</div>
    <div class="tab ${state.tab==='picklist'?'active':''}" onclick="state.tab='picklist';render()">Picklist</div>
  </div>
  ${state.tab==='teams'?renderTeamsList(teams):state.tab==='rankings'?renderRankings(teams):state.tab==='compare'?renderCompare(teams):renderPicklist(teams)}`;
}

function renderTeamsList(teams){
  return`<div class="card">
    <h2>Scouted Teams — ${state.eventCode}</h2>
    ${teams.map(t=>{
      const s=calcStats(t.number);
      return`<div class="team-row" onclick="openDetail(${t.number})">
        <div class="team-avatar" id="av-${t.number}">${String(t.number).slice(0,4)}</div>
        <div style="flex:1">
          <div class="team-num">${t.number}</div>
          <div class="team-name">${t.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600">${s?s.avgScore:0} avg pts</div>
          <div style="font-size:11px;color:#777">${s?`${s.wins}W-${s.losses}L-${s.ties}T`:''}</div>
        </div>
        <div style="margin-left:8px;font-size:18px;color:#bbb">›</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderRankings(teams){
  const sorted=teams.map(t=>({...t,stats:calcStats(t.number)})).filter(t=>t.stats).sort((a,b)=>b.stats.avgScore-a.stats.avgScore);
  return`<div class="card">
    <h2>Rankings by Avg Score</h2>
    ${sorted.map((t,i)=>`<div class="rank-row" style="background:${i===0?'#f1f8e9':i===1?'#f9fbe7':i===2?'#fff8e1':'#fff'};border:1px solid #e0e0e0;margin-bottom:6px">
      <div class="rank-num" style="background:${i===0?'#2e7d32':i===1?'#558b2f':i===2?'#827717':'#9e9e9e'}">${i+1}</div>
      <div style="flex:1">
        <span style="font-weight:700;color:#1b5e20">${t.number}</span>
        <span style="font-size:12px;color:#777;margin-left:6px">${t.name}</span>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700">${t.stats.avgScore} pts</div>
        <div style="font-size:11px;color:#888">${t.stats.wins}W-${t.stats.losses}L</div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderPicklist(teams){
  const scored=teams.map(t=>{
    const s=calcStats(t.number)||{avgScore:0,climbPct:0,avgCoralVal:0,wins:0,matchCount:1};
    const score=s.avgScore*0.5+s.climbPct*0.3+s.avgCoralVal*2+s.wins*3;
    return{...t,score:Math.round(score*10)/10,s};
  }).sort((a,b)=>b.score-a.score);
  return`<div class="card">
    <h2>Picklist <span style="font-size:11px;font-weight:400;color:#777">(avg score 50% + climb rate 30% + coral + wins)</span></h2>
    ${scored.map((t,i)=>`<div class="rank-row" style="border:1px solid #e0e0e0;background:#fff;margin-bottom:6px">
      <div class="rank-num">${i+1}</div>
      <div style="flex:1">
        <span style="font-weight:700;color:#1b5e20">${t.number}</span>
        <span style="font-size:12px;color:#555;margin-left:6px">${t.name}</span>
        <div style="font-size:11px;color:#888;margin-top:2px">Avg ${t.s.avgScore}pts · ${t.s.climbPct}% climb · ${t.s.avgCoralVal} coral/match</div>
      </div>
      <div style="font-weight:700;color:#1b5e20;font-size:16px">${t.score}</div>
    </div>`).join('')}
  </div>`;
}

function renderCompare(teams){
  const aStats=state.compareA?calcStats(state.compareA):null;
  const bStats=state.compareB?calcStats(state.compareB):null;
  const rows=[
    {label:'Avg Score',key:'avgScore',unit:'pts'},
    {label:'Best Score',key:'maxScore',unit:'pts'},
    {label:'Worst Score',key:'minScore',unit:'pts',lowerBetter:false},
    {label:'Avg Coral',key:'avgCoralVal',unit:''},
    {label:'Climb %',key:'climbPct',unit:'%'},
    {label:'Wins',key:'wins',unit:''},
    {label:'Losses',key:'losses',unit:'',lowerBetter:true},
  ];
  return`<div class="card">
    <h2>Compare Teams</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div><label style="font-size:12px;color:#777;display:block;margin-bottom:4px">Team A</label>
        <select onchange="state.compareA=+this.value;render()" style="width:100%">
          <option value="">Select team</option>
          ${teams.map(t=>`<option value="${t.number}" ${state.compareA===t.number?'selected':''}>${t.number} - ${t.name}</option>`).join('')}
        </select>
      </div>
      <div><label style="font-size:12px;color:#777;display:block;margin-bottom:4px">Team B</label>
        <select onchange="state.compareB=+this.value;render()" style="width:100%">
          <option value="">Select team</option>
          ${teams.map(t=>`<option value="${t.number}" ${state.compareB===t.number?'selected':''}>${t.number} - ${t.name}</option>`).join('')}
        </select>
      </div>
    </div>
    ${aStats&&bStats?`<div class="compare-grid">
      <div class="compare-col">
        <div class="compare-header">${state.compareA}</div>
        ${rows.map(r=>{const better=r.lowerBetter?aStats[r.key]<bStats[r.key]:aStats[r.key]>bStats[r.key];const worse=r.lowerBetter?aStats[r.key]>bStats[r.key]:aStats[r.key]<bStats[r.key];return`<div class="compare-val ${aStats[r.key]===bStats[r.key]?'':better?'better':worse?'worse':''}">${aStats[r.key]}${r.unit}</div>`}).join('')}
      </div>
      <div class="compare-label-col">
        <div style="padding:12px;background:#f5f5f5;text-align:center;font-weight:600;font-size:13px;color:#555">Metric</div>
        ${rows.map(r=>`<div class="compare-label">${r.label}</div>`).join('')}
      </div>
      <div class="compare-col">
        <div class="compare-header">${state.compareB}</div>
        ${rows.map(r=>{const better=r.lowerBetter?bStats[r.key]<aStats[r.key]:bStats[r.key]>aStats[r.key];const worse=r.lowerBetter?bStats[r.key]>aStats[r.key]:bStats[r.key]<aStats[r.key];return`<div class="compare-val ${bStats[r.key]===aStats[r.key]?'':better?'better':worse?'worse':''}">${bStats[r.key]}${r.unit}</div>`}).join('')}
      </div>
    </div>`:`<div style="color:#888;font-size:14px;padding:20px;text-align:center">Select two teams above to compare</div>`}
  </div>`;
}

async function openDetail(num){
  state.selTeam=num;
  state.screen='loading-detail';
  render();
  try{
    const tbaKey='frc'+num;
    const [info,events,media]=await Promise.allSettled([
      fetchTBA('/team/'+tbaKey),
      fetchTBA('/team/'+tbaKey+'/events/2025/statuses'),
      fetchTBA('/team/'+tbaKey+'/media/2025')
    ]);
    state.tbaInfo=info.status==='fulfilled'?info.value:null;
    state.tbaEvents=events.status==='fulfilled'?events.value:null;
    state.tbaMedia=media.status==='fulfilled'?media.value:[];
    // Get last event matches
    try{
      const evList=await fetchTBA('/team/'+tbaKey+'/events/2025');
      if(evList&&evList.length){
        const lastEv=evList[evList.length-1];
        const matches=await fetchTBA('/team/'+tbaKey+'/matches/'+lastEv.year+'/simple');
        state.tbaMatches=matches||[];
        state.tbaLastEvent=lastEv;
      }else{state.tbaMatches=[];state.tbaLastEvent=null;}
    }catch(e){state.tbaMatches=[];state.tbaLastEvent=null;}
  }catch(e){}
  state.screen='detail';
  render();
  loadAvatars();
}

function renderDetail(){
  const num=state.selTeam;
  const team=state.teams.find(t=>t.number===num)||{number:num,name:''};
  const s=calcStats(num);
  const matches=state.scoutData[num]||[];
  const info=state.tbaInfo;
  const media=(state.tbaMedia||[]).find(m=>m.type==='avatar'||m.type==='onshape'||m.type==='cdphotothread');
  const imgUrl=media?.direct_url||media?.view_url||null;
  // TBA last event match scores
  const tbaMatches=state.tbaMatches||[];
  const teamKey='frc'+num;
  const matchScores=tbaMatches.filter(m=>m.alliances).map(m=>{
    const onRed=m.alliances.red.team_keys.includes(teamKey);
    const allianceScore=onRed?m.alliances.red.score:m.alliances.blue.score;
    const oppScore=onRed?m.alliances.blue.score:m.alliances.red.score;
    return{matchNum:m.match_number,score:allianceScore,won:allianceScore>oppScore,comp:m.comp_level};
  }).filter(m=>m.comp==='qm').sort((a,b)=>a.matchNum-b.matchNum);
  const highMatch=matchScores.length?matchScores.reduce((a,b)=>a.score>b.score?a:b):null;
  const lowMatch=matchScores.length?matchScores.reduce((a,b)=>a.score<b.score?a:b):null;
  // TBA events
  const tbaEvents=state.tbaEvents||{};
  const eventList=Object.entries(tbaEvents).slice(0,6);
  return`
  <button class="back-btn" onclick="state.screen='list';render()">← Back</button>
  <div class="card">
    <div style="display:grid;grid-template-columns:auto 1fr;gap:20px;margin-bottom:16px">
      <div style="width:80px;height:80px;border-radius:12px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1b5e20;overflow:hidden" id="detail-av">
        ${imgUrl?`<img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`:`${num}`}
      </div>
      <div>
        <div style="font-size:24px;font-weight:700;color:#1b5e20">${num}</div>
        <div style="font-size:15px;color:#333">${info?.nickname||team.name}</div>
        <div style="font-size:12px;color:#777;margin-top:2px">${info?`${info.city||''}, ${info.state_prov||''} ${info.country||''} · Rookie ${info.rookie_year||''}`:`${team.city||''}${team.state?', '+team.state:''}`}</div>
        ${info?.website?`<a href="${info.website}" style="font-size:12px;color:#2e7d32;margin-top:4px;display:inline-block">${info.website}</a>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px">Scouted Performance</div>
        <div class="stat-grid" style="grid-template-columns:1fr 1fr">
          <div class="stat-box"><div class="stat-label">Avg Score</div><div class="stat-val">${s?.avgScore||0}</div></div>
          <div class="stat-box"><div class="stat-label">Record</div><div class="stat-val" style="font-size:15px">${s?`${s.wins}-${s.losses}-${s.ties}`:'—'}</div></div>
          <div class="stat-box"><div class="stat-label">Avg Coral</div><div class="stat-val">${s?.avgCoralVal||0}</div></div>
          <div class="stat-box"><div class="stat-label">Climb %</div><div class="stat-val">${s?.climbPct||0}%</div></div>
        </div>
        ${matches.length?`<div style="margin-top:10px">
          <div style="font-size:12px;font-weight:600;color:#777;margin-bottom:6px">SCOUTED MATCHES</div>
          ${matches.map(m=>`<div class="match-score-row">
            <span>Q${m.matchNum}</span>
            <span class="score-hl">${calcMatchScore(m)} pts</span>
            <span class="badge ${m.result==='win'?'badge-win':'badge-loss'}">${m.result}</span>
          </div>`).join('')}
        </div>`:''}
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px">TBA · Last Event ${state.tbaLastEvent?`(${state.tbaLastEvent.short_name||state.tbaLastEvent.name})`:''}
        </div>
        ${highMatch||lowMatch?`
          <div class="stat-box" style="margin-bottom:8px"><div class="stat-label">Highest Alliance Score</div><div class="stat-val score-hi">${highMatch?.score||'—'} <span style="font-size:12px;color:#888">Q${highMatch?.matchNum}</span></div></div>
          <div class="stat-box"><div class="stat-label">Lowest Alliance Score</div><div class="stat-val score-lo">${lowMatch?.score||'—'} <span style="font-size:12px;color:#888">Q${lowMatch?.matchNum}</span></div></div>
        `:`<div style="font-size:13px;color:#aaa;padding:12px 0">No TBA match data found</div>`}
        ${eventList.length?`<div style="margin-top:12px"><div style="font-size:12px;font-weight:600;color:#777;margin-bottom:6px">2025 EVENTS</div>
          ${eventList.map(([evKey,ev])=>`<div style="font-size:12px;padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between">
            <span>${evKey.replace(/\d{4}/,'').toUpperCase()}</span>
            <span style="color:#555">${ev.qual?.ranking?.rank?`Rank #${ev.qual.ranking.rank}`:''} ${ev.qual?.ranking?.record?`${ev.qual.ranking.record.wins}-${ev.qual.ranking.record.losses}-${ev.qual.ranking.record.ties}`:''}</span>
          </div>`).join('')}
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function loadAvatars(){
  const teams=scoutedTeams();
  teams.forEach(async t=>{
    try{
      const media=await fetchTBA('/team/frc'+t.number+'/media/2025');
      const av=(media||[]).find(m=>m.type==='avatar');
      if(av?.details?.base64Image){
        const el=document.getElementById('av-'+t.number);
        if(el)el.innerHTML=`<img src="data:image/png;base64,${av.details.base64Image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      }
    }catch(e){}
  });
}

loadStorage();
setInterval(async()=>{
  try{
    const r=await window.storage.get('frc_scout_data',true);
    if(r&&r.value){
      const d=JSON.parse(r.value);
      if(JSON.stringify(d.scoutedData)!==JSON.stringify(state.scoutData)){
        state.scoutData=d.scoutedData||{};
        state.teams=d.teams||[];
        state.eventCode=d.eventCode||'';
        document.getElementById('hdr-status').textContent='Updated ↑';
        setTimeout(()=>document.getElementById('hdr-status').textContent='',2000);
        if(state.screen==='list')render();
      }
    }
  }catch(e){}
},5000);
</script>
