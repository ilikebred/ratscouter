<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC Analysis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f3f4f6;color:#1a1a1a;min-height:100vh}
.header{background:#1b5e20;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600}
.hs{font-size:12px;opacity:.7;margin-left:auto}
.container{max-width:1000px;margin:0 auto;padding:20px}
.nav{display:flex;gap:4px;margin-bottom:18px;background:#fff;border-radius:10px;padding:5px;border:1px solid #e0e0e0}
.nav-tab{padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;font-weight:500;color:#555;transition:all .2s;flex:1;text-align:center}
.nav-tab.active{background:#1b5e20;color:#fff}
.card{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:20px;margin-bottom:14px}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#1b5e20}
.team-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;transition:all .2s;background:#fff;margin-bottom:8px}
.team-row:hover{background:#f1f8e9;border-color:#a5d6a7}
.team-avatar{width:44px;height:44px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#1b5e20;overflow:hidden;flex-shrink:0}
.team-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.back-btn{background:none;border:none;color:#2e7d32;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:14px;font-weight:500}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.stat-box{background:#f9fbe7;border:1px solid #dce775;border-radius:10px;padding:12px;text-align:center}
.stat-label{font-size:11px;color:#777;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:#1b5e20}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid #e0e0e0}
.rank-num{font-size:12px;font-weight:700;color:#fff;background:#1b5e20;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.compare-wrap{border:1px solid #e0e0e0;border-radius:12px;overflow:hidden}
.cmp-header{background:#1b5e20;color:#fff;padding:12px;text-align:center;font-weight:600;font-size:14px}
.cmp-label{padding:9px 12px;font-size:12px;color:#555;font-weight:500;text-align:center;border-bottom:1px solid #f0f0f0;background:#f9f9f9}
.cmp-val{padding:9px 12px;font-size:14px;font-weight:600;text-align:center;border-bottom:1px solid #f0f0f0}
.better{color:#2e7d32;background:#f1f8e9}.worse{color:#b71c1c;background:#fff8f8}
select,input{border:1px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;background:#fafafa;font-family:inherit}
button{border:none;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
.btn-primary{background:#1b5e20;color:#fff}
.sync-bar{background:#e8f5e9;border-radius:8px;padding:8px 14px;font-size:12px;color:#2e7d32;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.green{background:#43a047}.dot.yellow{background:#fdd835}.dot.red{background:#e53935}
.match-score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.hi{color:#2e7d32;font-weight:700}.lo{color:#c62828;font-weight:700}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-w{background:#c8e6c9;color:#1b5e20}.badge-l{background:#ffcdd2;color:#b71c1c}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #ccc;border-top-color:#1b5e20;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  <h1>FRC Analysis</h1>
  <span class="hs" id="hdr-status"></span>
</div>
<div class="container" id="app"><div style="padding:30px;text-align:center;color:#888">Loading…</div></div>

<script>
// ─────────────────────────────────────────
//  🔧 PASTE YOUR SUPABASE CREDENTIALS HERE
// ─────────────────────────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
// ─────────────────────────────────────────

const TBA = 'iKwYPFM2U6Qnn2VRXyMclANWgdYrWDHI63wr69b9mGHPvB9k1gvZbNi9f3qljuD7';
const STORAGE_KEY = 'frc_scout_data';
const SUPABASE_ROW = 'scout';
const supabaseReady = SUPABASE_URL !== 'YOUR_SUPABASE_URL';

let state = {
  tab:'teams', screen:'list', scoutData:{}, teams:[], eventCode:'', eventName:'',
  selTeam:null, compareA:null, compareB:null, tbaCache:{}, tbaInfo:null,
  tbaMedia:[], tbaMatches:[], tbaEvents:null, tbaLastEvent:null
};

// ── STORAGE ──────────────────────────────

function localLoad(){
  try{ const d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):null; }catch(e){ return null; }
}

async function supabaseLoad(){
  if(!supabaseReady) return null;
  const r = await fetch(`${SUPABASE_URL}/rest/v1/frc_scout_data?id=eq.${SUPABASE_ROW}&select=data`,{
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}
  });
  const rows = await r.json();
  return rows?.[0]?.data || null;
}

async function loadScoutData(){
  let data = null;
  if(supabaseReady){
    try{ data = await supabaseLoad(); }catch(e){}
  }
  if(!data) data = localLoad();
  if(data){
    state.scoutData  = data.scoutedData || {};
    state.teams      = data.teams || [];
    state.eventCode  = data.eventCode || '';
    state.eventName  = data.eventName || '';
  }
  setHdr(supabaseReady ? 'Cloud sync ✓' : 'Local data', 2000);
  render();
  loadAvatars();
}

// Poll every 8s for updates from Scout app
setInterval(async()=>{
  if(state.screen==='detail') return;
  try{
    let remote = supabaseReady ? await supabaseLoad() : localLoad();
    if(!remote) return;
    const rs = JSON.stringify(remote.scoutedData);
    const ls = JSON.stringify(state.scoutData);
    if(rs !== ls){
      state.scoutData = remote.scoutedData||{};
      state.teams = remote.teams||[];
      state.eventCode = remote.eventCode||'';
      state.eventName = remote.eventName||'';
      localStorage.setItem(STORAGE_KEY, JSON.stringify(remote));
      setHdr('Updated ↓', 2500);
      if(state.screen==='list') render();
    }
  }catch(e){}
}, 8000);

function setHdr(msg, dur=0){
  const el=document.getElementById('hdr-status');
  if(!el) return;
  el.textContent=msg;
  if(dur) setTimeout(()=>el.textContent='', dur);
}

// ── TBA ──────────────────────────────────

async function tba(path){
  if(state.tbaCache[path]) return state.tbaCache[path];
  const r = await fetch('https://www.thebluealliance.com/api/v3'+path,{headers:{'X-TBA-Auth-Key':TBA}});
  if(!r.ok) throw new Error(r.status);
  const d = await r.json();
  state.tbaCache[path] = d;
  return d;
}

// ── SCORING ──────────────────────────────

function calcScore(m){
  const auto = (m.autoL1||0)*3+(m.autoL2||0)*4+(m.autoL3||0)*6+(m.autoL4||0)*7
             + (m.autoAlgae||0)*4+(m.autoAlgaeProc||0)*6+(m.mobility==='Yes'?3:0);
  const tele = (m.teleL1||0)*2+(m.teleL2||0)*3+(m.teleL3||0)*4+(m.teleL4||0)*5
             + (m.teleAlgae||0)*4+(m.teleAlgaeProc||0)*6;
  const end  = m.endgame==='Deep'?12:m.endgame==='Shallow'?6:m.endgame==='Park'?2:0;
  return auto+tele+end;
}

function calcStats(num){
  const ms = state.scoutData[num]||[];
  if(!ms.length) return null;
  const wins=ms.filter(m=>m.result==='win').length;
  const scores=ms.map(calcScore);
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const coral=ms.map(m=>(m.autoL1||0)+(m.autoL2||0)+(m.autoL3||0)+(m.autoL4||0)+(m.teleL1||0)+(m.teleL2||0)+(m.teleL3||0)+(m.teleL4||0));
  const avgCoral=Math.round(coral.reduce((a,b)=>a+b,0)/coral.length*10)/10;
  const climbs=ms.filter(m=>m.endgame&&m.endgame!=='None').length;
  return{wins,losses:ms.length-wins,ties:ms.filter(m=>m.result==='tie').length,
    avgScore:avg,maxScore:Math.max(...scores),minScore:Math.min(...scores),
    avgCoral,climbPct:Math.round(climbs/ms.length*100),matchCount:ms.length};
}

function scoutedTeams(){
  return state.teams.filter(t=>state.scoutData[t.number]?.length>0);
}

// ── RENDER ───────────────────────────────

function render(){
  const app=document.getElementById('app');
  if(state.screen==='list') app.innerHTML=renderList();
  else if(state.screen==='detail') app.innerHTML=renderDetail();
}

function renderList(){
  const teams=scoutedTeams();
  if(!teams.length) return `
    <div class="card">
      <div style="color:#888;font-size:14px">No scouted teams found.</div>
      <div style="font-size:12px;color:#bbb;margin-top:6px">Open the Scout app, load an event, and scout some matches. Data will appear here automatically.</div>
      ${!supabaseReady?`<div class="status warn" style="margin-top:10px;padding:8px 12px;border-radius:8px;background:#fff8e1;color:#e65100;font-size:12px">⚠ Add Supabase keys in both files for cross-device sync.</div>`:''}
    </div>`;
  return `
  <div class="sync-bar">
    <span class="dot ${supabaseReady?'green':'yellow'}"></span>
    <strong>${state.eventName||state.eventCode||'No event'}</strong> &nbsp;·&nbsp;
    ${teams.length} scouted teams &nbsp;·&nbsp;
    ${supabaseReady?'Cloud sync on':'Local only'}
  </div>
  <div class="nav">
    ${['teams','rankings','compare','picklist'].map(t=>`<div class="nav-tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('')}
  </div>
  ${ state.tab==='teams'    ? renderTeamsList(teams)
   : state.tab==='rankings' ? renderRankings(teams)
   : state.tab==='compare'  ? renderCompare(teams)
   :                          renderPicklist(teams) }`;
}

function renderTeamsList(teams){
  return `<div class="card">
    <h2>Scouted Teams</h2>
    ${teams.map(t=>{
      const s=calcStats(t.number);
      return `<div class="team-row" onclick="openDetail(${t.number})">
        <div class="team-avatar" id="av-${t.number}">${String(t.number).slice(0,4)}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:#1b5e20">${t.number}</div>
          <div style="font-size:13px;color:#555">${t.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600">${s?s.avgScore:0} avg pts</div>
          <div style="font-size:11px;color:#777">${s?`${s.wins}W-${s.losses}L`:''}</div>
        </div>
        <div style="color:#ccc;font-size:18px;margin-left:4px">›</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderRankings(teams){
  const sorted=teams.map(t=>({...t,s:calcStats(t.number)})).filter(t=>t.s).sort((a,b)=>b.s.avgScore-a.s.avgScore);
  const medals=['#2e7d32','#558b2f','#827717'];
  return `<div class="card"><h2>Rankings by Avg Score</h2>
    ${sorted.map((t,i)=>`<div class="rank-row" style="background:${i<3?'#f9fbe7':'#fff'}">
      <div class="rank-num" style="background:${medals[i]||'#9e9e9e'}">${i+1}</div>
      <div style="flex:1">
        <span style="font-weight:700;color:#1b5e20">${t.number}</span>
        <span style="font-size:12px;color:#777;margin-left:6px">${t.name}</span>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700">${t.s.avgScore} pts</div>
        <div style="font-size:11px;color:#888">${t.s.wins}W-${t.s.losses}L · ${t.s.climbPct}% climb</div>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderPicklist(teams){
  const scored=teams.map(t=>{
    const s=calcStats(t.number)||{avgScore:0,climbPct:0,avgCoral:0,wins:0,matchCount:1};
    const score=s.avgScore*0.5+s.climbPct*0.3+s.avgCoral*2+s.wins*3;
    return{...t,score:Math.round(score*10)/10,s};
  }).sort((a,b)=>b.score-a.score);
  return `<div class="card">
    <h2>Picklist <span style="font-size:11px;font-weight:400;color:#999">(avg score 50% + climb 30% + coral + wins)</span></h2>
    ${scored.map((t,i)=>`<div class="rank-row" style="background:#fff">
      <div class="rank-num">${i+1}</div>
      <div style="flex:1">
        <span style="font-weight:700;color:#1b5e20">${t.number}</span>
        <span style="font-size:12px;color:#555;margin-left:6px">${t.name}</span>
        <div style="font-size:11px;color:#888;margin-top:2px">Avg ${t.s.avgScore}pts · ${t.s.climbPct}% climb · ${t.s.avgCoral||0} coral/match</div>
      </div>
      <div style="font-weight:700;color:#1b5e20;font-size:16px">${t.score}</div>
    </div>`).join('')}
  </div>`;
}

function renderCompare(teams){
  const aS=state.compareA?calcStats(state.compareA):null;
  const bS=state.compareB?calcStats(state.compareB):null;
  const rows=[
    {label:'Avg Score',key:'avgScore',unit:'pts'},
    {label:'Best Score',key:'maxScore',unit:'pts'},
    {label:'Worst Score',key:'minScore',unit:'pts'},
    {label:'Avg Coral',key:'avgCoral',unit:''},
    {label:'Climb %',key:'climbPct',unit:'%'},
    {label:'Wins',key:'wins',unit:''},
    {label:'Losses',key:'losses',unit:'',lower:true},
  ];
  const opt=teams.map(t=>`<option value="${t.number}" ${state.compareA===t.number||state.compareB===t.number?'selected':''}">${t.number} – ${t.name}</option>`).join('');
  return `<div class="card"><h2>Compare Teams</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div><label style="font-size:12px;color:#777;display:block;margin-bottom:4px">Team A</label>
        <select onchange="state.compareA=+this.value;render()" style="width:100%">
          <option value="">Select…</option>
          ${teams.map(t=>`<option value="${t.number}" ${state.compareA===t.number?'selected':''}>${t.number} – ${t.name}</option>`).join('')}
        </select></div>
      <div><label style="font-size:12px;color:#777;display:block;margin-bottom:4px">Team B</label>
        <select onchange="state.compareB=+this.value;render()" style="width:100%">
          <option value="">Select…</option>
          ${teams.map(t=>`<option value="${t.number}" ${state.compareB===t.number?'selected':''}>${t.number} – ${t.name}</option>`).join('')}
        </select></div>
    </div>
    ${aS&&bS ? `<div class="compare-wrap" style="display:grid;grid-template-columns:1fr auto 1fr">
      <div><div class="cmp-header">${state.compareA}</div>${rows.map(r=>{const b=r.lower?aS[r.key]<bS[r.key]:aS[r.key]>bS[r.key];const w=r.lower?aS[r.key]>bS[r.key]:aS[r.key]<bS[r.key];return`<div class="cmp-val ${aS[r.key]===bS[r.key]?'':b?'better':w?'worse':''}">${aS[r.key]}${r.unit}</div>`;}).join('')}</div>
      <div><div class="cmp-header" style="background:#555">Metric</div>${rows.map(r=>`<div class="cmp-label">${r.label}</div>`).join('')}</div>
      <div><div class="cmp-header">${state.compareB}</div>${rows.map(r=>{const b=r.lower?bS[r.key]<aS[r.key]:bS[r.key]>aS[r.key];const w=r.lower?bS[r.key]>aS[r.key]:bS[r.key]<aS[r.key];return`<div class="cmp-val ${bS[r.key]===aS[r.key]?'':b?'better':w?'worse':''}">${bS[r.key]}${r.unit}</div>`;}).join('')}</div>
    </div>` : `<div style="color:#999;text-align:center;padding:20px">Select two teams above to compare</div>`}
  </div>`;
}

// ── DETAIL ───────────────────────────────

async function openDetail(num){
  state.selTeam=num; state.screen='detail';
  state.tbaInfo=null; state.tbaMedia=[]; state.tbaMatches=[]; state.tbaLastEvent=null; state.tbaEvents=null;
  render();
  try{
    const key='frc'+num;
    const [info,media,evList]=await Promise.allSettled([tba(`/team/${key}`),tba(`/team/${key}/media/2025`),tba(`/team/${key}/events/2025/simple`)]);
    state.tbaInfo=info.status==='fulfilled'?info.value:null;
    state.tbaMedia=media.status==='fulfilled'?media.value:[];
    if(evList.status==='fulfilled'&&evList.value?.length){
      const evs=evList.value.sort((a,b)=>new Date(a.start_date)-new Date(b.start_date));
      state.tbaEvents=evs;
      const last=evs[evs.length-1];
      state.tbaLastEvent=last;
      try{
        const ms=await tba(`/team/${key}/matches/${last.year}/simple`);
        state.tbaMatches=(ms||[]).filter(m=>m.comp_level==='qm'&&m.event_key===last.key);
      }catch(e){}
    }
  }catch(e){}
  render();
}

function renderDetail(){
  const num=state.selTeam;
  const team=state.teams.find(t=>t.number===num)||{number:num,name:''};
  const s=calcStats(num);
  const ms=state.scoutData[num]||[];
  const info=state.tbaInfo;
  const img=(state.tbaMedia||[]).find(m=>m.type==='avatar'||m.type==='cdphotothread'||m.type==='imgur');
  const imgUrl=img?.direct_url||img?.view_url||null;

  // TBA match scores
  const teamKey='frc'+num;
  const tbaScores=(state.tbaMatches||[]).map(m=>{
    const onRed=m.alliances?.red?.team_keys?.includes(teamKey);
    const score=onRed?m.alliances.red.score:m.alliances?.blue?.score;
    const won=onRed?(m.alliances.red.score>m.alliances.blue.score):(m.alliances?.blue?.score>m.alliances?.red?.score);
    return{matchNum:m.match_number,score,won};
  }).filter(m=>m.score>=0).sort((a,b)=>a.matchNum-b.matchNum);
  const hiMatch=tbaScores.length?tbaScores.reduce((a,b)=>a.score>b.score?a:b):null;
  const loMatch=tbaScores.length?tbaScores.reduce((a,b)=>a.score<b.score?a:b):null;

  const loading=!info&&!state.tbaEvents;

  return `
  <button class="back-btn" onclick="state.screen='list';render()">← Back</button>
  <div class="card">
    <div style="display:grid;grid-template-columns:auto 1fr;gap:20px;margin-bottom:18px;align-items:start">
      <div style="width:80px;height:80px;border-radius:14px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1b5e20;overflow:hidden;flex-shrink:0">
        ${imgUrl?`<img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:14px" onerror="this.style.display='none'">`:`${num}`}
      </div>
      <div>
        <div style="font-size:26px;font-weight:700;color:#1b5e20">${num}</div>
        <div style="font-size:15px;color:#333;margin-top:2px">${info?.nickname||team.name}</div>
        <div style="font-size:12px;color:#888;margin-top:3px">${info?`${info.city||''},${info.state_prov||''} ${info.country||''} · Rookie ${info.rookie_year||''}`:team.city||''}</div>
        ${info?.website?`<a href="${info.website}" target="_blank" style="font-size:12px;color:#2e7d32;margin-top:4px;display:inline-block">${info.website}</a>`:''}
      </div>
    </div>

    ${loading?`<div style="color:#aaa;font-size:13px"><span class="spinner"></span>Loading TBA data…</div>`:''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- LEFT: Scouted data -->
      <div>
        <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:10px">Our Scouted Data</div>
        ${s?`<div class="stat-grid" style="grid-template-columns:1fr 1fr">
          <div class="stat-box"><div class="stat-label">Avg Score</div><div class="stat-val">${s.avgScore}</div></div>
          <div class="stat-box"><div class="stat-label">Record</div><div class="stat-val" style="font-size:15px">${s.wins}W-${s.losses}L</div></div>
          <div class="stat-box"><div class="stat-label">Avg Coral</div><div class="stat-val">${s.avgCoral}</div></div>
          <div class="stat-box"><div class="stat-label">Climb %</div><div class="stat-val">${s.climbPct}%</div></div>
        </div>
        ${ms.map(m=>`<div class="match-score-row">
          <span>Q${m.matchNum}</span>
          <span style="font-weight:600">${calcScore(m)} pts</span>
          <span class="badge ${m.result==='win'?'badge-w':'badge-l'}">${m.result}</span>
        </div>`).join('')}`
        :`<div style="color:#bbb;font-size:13px">No scouted matches yet</div>`}
      </div>

      <!-- RIGHT: TBA data -->
      <div>
        <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:10px">
          TBA · ${state.tbaLastEvent?state.tbaLastEvent.short_name||state.tbaLastEvent.name:'Last Event'}
        </div>
        ${hiMatch?`
          <div class="stat-box" style="margin-bottom:8px"><div class="stat-label">Highest Alliance Score</div><div class="stat-val hi">${hiMatch.score} <span style="font-size:11px;color:#888">Q${hiMatch.matchNum}</span></div></div>
          <div class="stat-box" style="margin-bottom:12px"><div class="stat-label">Lowest Alliance Score</div><div class="stat-val lo">${loMatch.score} <span style="font-size:11px;color:#888">Q${loMatch.matchNum}</span></div></div>`
        :(state.tbaLastEvent?`<div style="font-size:12px;color:#bbb;margin-bottom:10px">No match scores available</div>`:`<div style="font-size:12px;color:#bbb;margin-bottom:10px">Loading…</div>`)}

        ${state.tbaEvents?.length?`
          <div style="font-size:12px;font-weight:600;color:#777;margin-bottom:6px">2025 EVENTS</div>
          ${state.tbaEvents.map(ev=>`<div style="font-size:12px;padding:5px 0;border-bottom:1px solid #f5f5f5">
            <span style="font-weight:500">${ev.short_name||ev.name}</span>
            <span style="color:#888;float:right">${ev.start_date?.slice(0,10)||''}</span>
          </div>`).join('')}`:''}
      </div>
    </div>
  </div>`;
}

async function loadAvatars(){
  const teams=scoutedTeams();
  for(const t of teams){
    try{
      const media=await tba(`/team/frc${t.number}/media/2025`);
      const av=(media||[]).find(m=>m.type==='avatar');
      if(av?.details?.base64Image){
        const el=document.getElementById('av-'+t.number);
        if(el) el.innerHTML=`<img src="data:image/png;base64,${av.details.base64Image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      }
    }catch(e){}
  }
}

loadScoutData();
</script>
